<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Reply Complaint</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f9f4;
            color: #1e5631;
        }

        /* Background */
        .bg-animation {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9, #ffffff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .content-wrapper {
            margin-left: 300px;
            padding: 40px 60px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(76,175,80,0.2);
            box-shadow: 0 10px 40px rgba(76,175,80,0.12);
        }

        .page-header h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-wrapper {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(76,175,80,0.2);
            box-shadow: 0 10px 40px rgba(76,175,80,0.15);
        }

        .complaint-box {
            background: rgba(76,175,80,0.06);
            border: 1px solid rgba(76,175,80,0.25);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            font-size: 15px;
            line-height: 1.6;
        }

        label {
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(76,175,80,0.3);
            font-size: 14px;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.2);
        }

        .btn-submit {
            margin-top: 20px;
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76,175,80,0.45);
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

{% include 'admin_header.html' %}

<div class="content-wrapper">

    <div class="page-header">
        <h2><i class="bi bi-reply-fill"></i> Reply to Complaint</h2>
    </div>

    <div class="form-wrapper">

        <label>Complaint</label>
        <div class="complaint-box">
            {{ complaint.complaint }}
        </div>

        <form method="POST">
            {% csrf_token %}

            <label>Reply</label>
            <textarea name="reply" required>{{ complaint.reply }}</textarea>

            <button type="submit" class="btn-submit">
                Send Reply
            </button>
        </form>

    </div>
</div>

</body>
</html>
