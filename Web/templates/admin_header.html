<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f9f4;
            color: #1e5631;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 50%, #ffffff 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=1920&q=80'),
                linear-gradient(135deg, rgba(46, 125, 50, 0.05) 0%, rgba(129, 199, 132, 0.05) 100%);
            background-blend-mode: overlay;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(76, 175, 80, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(129, 199, 132, 0.1) 0%, transparent 50%);
            animation: bgMove 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(76, 175, 80, 0.2);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 30px rgba(46, 125, 50, 0.1);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(76, 175, 80, 0.05);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(76, 175, 80, 0.3);
            border-radius: 10px;
        }

        .sidebar-header {
            padding: 40px 30px;
            border-bottom: 1px solid rgba(76, 175, 80, 0.2);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(129, 199, 132, 0.1) 100%);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
            animation: pulse 2s ease-in-out infinite;
            color: #fff;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 8px 30px rgba(76, 175, 80, 0.5); }
        }

        .sidebar-header h2 {
            color: #2e7d32;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .admin-role {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(76, 175, 80, 0.15);
            color: #2e7d32;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .sidebar-nav {
            padding: 30px 0;
        }

        .nav-section {
            margin-bottom: 30px;
        }

        .nav-label {
            padding: 0 30px 15px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(46, 125, 50, 0.6);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 16px 30px;
            color: rgba(30, 86, 49, 0.7);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 15px;
            font-weight: 500;
            margin: 4px 15px;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(129, 199, 132, 0.2) 100%);
            color: #2e7d32;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 0;
            width: 3px;
            background: linear-gradient(180deg, #4caf50, #66bb6a);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s ease;
        }

        .nav-item:hover::before,
        .nav-item.active::before {
            height: 70%;
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(244, 67, 54, 0.15);
            color: #d32f2f;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 40px 60px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid rgba(76, 175, 80, 0.2);
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.1);
        }

        .welcome-text h2 {
            color: #2e7d32;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .welcome-text p {
            color: rgba(30, 86, 49, 0.6);
            font-size: 14px;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
            color: #2e7d32;
        }

        .action-btn:hover {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        .content-header {
            margin-bottom: 40px;
        }

        .content-header h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .content-header p {
            color: rgba(30, 86, 49, 0.6);
            font-size: 16px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(76, 175, 80, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #4caf50, #66bb6a);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(76, 175, 80, 0.4);
            box-shadow: 0 10px 40px rgba(76, 175, 80, 0.2);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15), rgba(129, 199, 132, 0.15));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #2e7d32;
        }

        .stat-change {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .stat-change.up {
            background: rgba(76, 175, 80, 0.15);
            color: #2e7d32;
        }

        .stat-change.down {
            background: rgba(244, 67, 54, 0.15);
            color: #d32f2f;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(30, 86, 49, 0.6);
            font-weight: 500;
        }

        /* Dashboard Cards */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 0;
            border-radius: 20px;
            border: 1px solid rgba(76, 175, 80, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(46, 125, 50, 0.8) 100%);
        }

        .card-image.pharmacy {
            background-image: url('https://images.unsplash.com/photo-1576602976047-174e57a47881?w=800&q=80');
        }

        .card-image.complaints {
            background-image: url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800&q=80');
        }

        .card-image.users {
            background-image: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&q=80');
        }

        .card-content {
            padding: 35px;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::after {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(76, 175, 80, 0.5);
            box-shadow: 0 20px 60px rgba(76, 175, 80, 0.25);
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 30px;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            color: #fff;
        }

        .card:hover .card-icon {
            transform: rotateY(360deg) scale(1.1);
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.5);
        }

        .card h3 {
            color: #2e7d32;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: rgba(30, 86, 49, 0.7);
            font-size: 14px;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .card-arrow {
            position: absolute;
            right: 30px;
            bottom: 30px;
            font-size: 24px;
            color: rgba(76, 175, 80, 0.4);
            transition: all 0.3s ease;
            z-index: 1;
        }

        .card:hover .card-arrow {
            transform: translateX(5px);
            color: #4caf50;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }

            .sidebar-header h2,
            .admin-role,
            .nav-label,
            .nav-item span {
                display: none;
            }

            .logo-container {
                justify-content: center;
            }

            .nav-item {
                justify-content: center;
                padding: 16px;
            }

            .nav-icon {
                margin-right: 0;
            }

            .main-content {
                margin-left: 80px;
                padding: 30px 20px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-cards {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .content-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo"><i class="bi bi-lightning-charge-fill"></i></div>
                    <div>
                        <h2>Admin</h2>
                        <div class="admin-role">
                            <span class="status-dot"></span>
                            <span>Super Admin</span>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-label">Main</div>
                    <a href="#" class="nav-item active">
                        <div class="nav-icon"><i class="bi bi-house-door-fill"></i></div>
                        <span>Dashboard</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-label">Management</div>
                    <a href="/admin_manage_pharmacies/" class="nav-item">
                        <div class="nav-icon"><i class="bi bi-capsule"></i></div>
                        <span>Pharmacies</span>
                    </a>
                    <a href="/admin_view_complaints/" class="nav-item">
                        <div class="nav-icon"><i class="bi bi-clipboard-check"></i></div>
                        <span>Complaints</span>
                        <span class="nav-badge">3</span>
                    </a>
                    <a href="/admin_manage_users/" class="nav-item">
                        <div class="nav-icon"><i class="bi bi-people-fill"></i></div>
                        <span>Users</span>
                    </a>

                     <a href="{% url 'logout' %}" class="nav-item">
                        <div class="nav-icon"><i class="bi bi-people-fill"></i></div>
                        <span>logout</span>
                    </a>
                </div>
            </nav>
        </aside>
