{% include 'pharmacy_header.html' %}
<div class="container mt-5">
  <h2 class="text-center mb-4">Add Medicine</h2>
  <form method="POST">
    {% csrf_token %}
    <!-- Same fields as your earlier form -->
    <div class="mb-3">
      <label>Medicine Name</label>
      <input type="text" name="medicine_name" class="form-control">
    </div>
    <div class="mb-3">
      <label>Company Name</label>
      <input type="text" name="company_name" class="form-control">
    </div>
    <div class="mb-3">
      <label>Medicine Type</label>
      <input type="text" name="medicine_type" class="form-control">
    </div>
    <div class="mb-3">
      <label>Manufacture Date</label>
      <input type="date" name="manufacture_date" class="form-control">
    </div>
    <div class="mb-3">
      <label>Expiry Date</label>
      <input type="date" name="expiry_date" class="form-control">
    </div>
    <div class="mb-3">
      <label>Quantity</label>
      <input type="number" name="quantity" class="form-control">
    </div>
    <div class="mb-3">
      <label>Price</label>
      <input type="number" step="0.01" name="price" class="form-control">
    </div>
    <div class="mb-3">
      <label>Details</label>
      <textarea name="details" class="form-control"></textarea>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" name="prescription_require">
      <label class="form-check-label">Prescription Required</label>
    </div>
    <button type="submit" class="btn btn-success">Add Medicine</button>
  </form>
</div>
{% include 'footer.html' %}
